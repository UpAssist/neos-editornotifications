privilegeTargets:
  'Neos\Flow\Security\Authorization\Privilege\Method\MethodPrivilege':
    'UpAssist.Neos.EditorNotifications:ManageNotifications':
      matcher: 'method(UpAssist\Neos\EditorNotifications\Controller\Backend\Module\NotificationModuleController->.*Action())'
    'UpAssist.Neos.EditorNotifications:ReadNotifications':
      matcher: 'method(UpAssist\Neos\EditorNotifications\Api\Controller\NotificationApiController->(active|unreadCount|markSeen|markUnseen|dismiss)Action())'
    'UpAssist.Neos.EditorNotifications:UploadNotificationImage':
      matcher: 'method(UpAssist\Neos\EditorNotifications\Api\Controller\NotificationApiController->uploadImageAction())'

  'Neos\Neos\Security\Authorization\Privilege\ModulePrivilege':
    'UpAssist.Neos.EditorNotifications:Backend.Module.Administration.Notifications':
      matcher: 'administration/notifications'

roles:
  'Neos.Neos:Administrator':
    privileges:
      - privilegeTarget: 'UpAssist.Neos.EditorNotifications:Backend.Module.Administration.Notifications'
        permission: GRANT
      - privilegeTarget: 'UpAssist.Neos.EditorNotifications:ManageNotifications'
        permission: GRANT
      - privilegeTarget: 'UpAssist.Neos.EditorNotifications:ReadNotifications'
        permission: GRANT
      - privilegeTarget: 'UpAssist.Neos.EditorNotifications:UploadNotificationImage'
        permission: GRANT
  'Neos.Neos:Editor':
    privileges:
      - privilegeTarget: 'UpAssist.Neos.EditorNotifications:ReadNotifications'
        permission: GRANT
